<!-- Preloader -->
<div class="preloader" #preloader>
  <div class="loader-text">
    <span class="char" #loaderChar>A</span>
    <span class="char" #loaderChar>R</span>
    <span class="char" #loaderChar>C</span>
    <span class="char" #loaderChar>H</span>
    <span class="char" #loaderChar>I</span>
    <span class="char" #loaderChar>T</span>
    <span class="char char--accent" #loaderChar>.</span>
  </div>
  <!-- Green accent line grows under text during preloader -->
  <div class="loader-line" #loaderLine></div>
</div>

<app-custom-cursor />

<a class="resume-badge hoverable" #floatingBtn target="_blank" rel="noopener noreferrer"
  href="https://drive.google.com/file/d/1EB7sm0s2JdGwiux5YC6yiQYeTxyi5wTN/view?usp=sharing"
  aria-label="View Archit Jain's Resume">

  <!-- Scroll progress ring — fills green as user scrolls down the page -->
  <svg class="badge-progress-ring" viewBox="0 0 126 126" aria-hidden="true">
    <circle class="ring-track" cx="63" cy="63" r="58" />
    <circle class="ring-fill"  cx="63" cy="63" r="58" #progressRing />
  </svg>

  <!-- Rotating orbital text -->
  <svg class="badge-orbit-text" viewBox="0 0 100 100" aria-hidden="true">
    <path id="resumeOrbitPath" d="M 50,50 m -35,0 a 35,35 0 1,1 70,0 a 35,35 0 1,1 -70,0" />
    <text>
      <textPath href="#resumeOrbitPath">VIEW RESUME • ARCHIT JAIN • </textPath>
    </text>
  </svg>

  <!-- Center: document + download icon -->
  <svg class="badge-center-icon" viewBox="0 0 24 24" fill="none"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
    <polyline points="14 2 14 8 20 8"></polyline>
    <line x1="12" y1="18" x2="12" y2="12"></line>
    <polyline points="9 15 12 18 15 15"></polyline>
  </svg>

</a>

<div class="main-container">
  <app-hero />
  <app-about />
  <app-experience />
  <app-projects />
</div>
